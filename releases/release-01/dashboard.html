<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WM Test Report</title>
<style>
  :root {
    --bg: #F5F6F9;
    --card: #FFFFFF;
    --card-border: #DFE3EA;
    --card-shadow: rgba(30,41,59,0.06);
    --text-1: #1E293B;
    --text-2: #5A6578;
    --text-3: #94A3B8;
    --accent: #3B6DF0;
    --accent-bg: rgba(59,109,240,0.08);
    --passed: #16A34A;
    --passed-bg: rgba(22,163,74,0.1);
    --failed: #DC2626;
    --failed-bg: rgba(220,38,38,0.1);
    --broken: #EA580C;
    --broken-bg: rgba(234,88,12,0.1);
    --skipped: #9CA3AF;
    --skipped-bg: rgba(156,163,175,0.1);
    --handle: #CBD5E1;
    --handle-hover: #94A3B8;
    --drag-ghost: rgba(59,109,240,0.12);
    --drop-indicator: #3B6DF0;
    --bar-track: #EEF0F4;
    --evidence-bg: #F8F9FB;
    --mono: ui-monospace, 'Cascadia Code', 'Source Code Pro', 'Menlo', monospace;
    --toggle-bg: #E2E8F0;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #13151A;
      --card: #1C1F26;
      --card-border: #2A2E37;
      --card-shadow: rgba(0,0,0,0.3);
      --text-1: #E2E8F0;
      --text-2: #94A3B8;
      --text-3: #64748B;
      --accent: #6B8FF8;
      --accent-bg: rgba(107,143,248,0.1);
      --passed: #4ADE80;
      --passed-bg: rgba(74,222,128,0.1);
      --failed: #F87171;
      --failed-bg: rgba(248,113,113,0.1);
      --broken: #FB923C;
      --broken-bg: rgba(251,146,60,0.1);
      --skipped: #6B7280;
      --skipped-bg: rgba(107,114,128,0.1);
      --handle: #3A3F4A;
      --handle-hover: #5A6578;
      --drag-ghost: rgba(107,143,248,0.1);
      --drop-indicator: #6B8FF8;
      --bar-track: #252830;
      --evidence-bg: #161820;
      --toggle-bg: #2A2E37;
    }
  }
  [data-theme="dark"] {
    --bg: #13151A;
    --card: #1C1F26;
    --card-border: #2A2E37;
    --card-shadow: rgba(0,0,0,0.3);
    --text-1: #E2E8F0;
    --text-2: #94A3B8;
    --text-3: #64748B;
    --accent: #6B8FF8;
    --accent-bg: rgba(107,143,248,0.1);
    --passed: #4ADE80;
    --passed-bg: rgba(74,222,128,0.1);
    --failed: #F87171;
    --failed-bg: rgba(248,113,113,0.1);
    --broken: #FB923C;
    --broken-bg: rgba(251,146,60,0.1);
    --skipped: #6B7280;
    --skipped-bg: rgba(107,114,128,0.1);
    --handle: #3A3F4A;
    --handle-hover: #5A6578;
    --drag-ghost: rgba(107,143,248,0.1);
    --drop-indicator: #6B8FF8;
    --bar-track: #252830;
    --evidence-bg: #161820;
    --toggle-bg: #2A2E37;
  }
  [data-theme="light"] {
    --bg: #F5F6F9;
    --card: #FFFFFF;
    --card-border: #DFE3EA;
    --card-shadow: rgba(30,41,59,0.06);
    --text-1: #1E293B;
    --text-2: #5A6578;
    --text-3: #94A3B8;
    --accent: #3B6DF0;
    --accent-bg: rgba(59,109,240,0.08);
    --passed: #16A34A;
    --passed-bg: rgba(22,163,74,0.1);
    --failed: #DC2626;
    --failed-bg: rgba(220,38,38,0.1);
    --broken: #EA580C;
    --broken-bg: rgba(234,88,12,0.1);
    --skipped: #9CA3AF;
    --skipped-bg: rgba(156,163,175,0.1);
    --handle: #CBD5E1;
    --handle-hover: #94A3B8;
    --drag-ghost: rgba(59,109,240,0.12);
    --drop-indicator: #3B6DF0;
    --bar-track: #EEF0F4;
    --evidence-bg: #F8F9FB;
    --toggle-bg: #E2E8F0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text-1);
    min-height: 100vh;
    padding: 24px;
    transition: background 0.2s, color 0.2s;
  }

  .dashboard { max-width: 1100px; margin: 0 auto; }

  .dash-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 0 12px;
    border-bottom: 1px solid var(--card-border);
    margin-bottom: 14px;
  }
  .logo { width: 32px; height: 32px; border-radius: 6px; }
  .dash-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .dash-meta {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .dash-date {
    font-size: 12px;
    color: var(--text-3);
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
  }
  .theme-toggle {
    width: 36px; height: 20px;
    background: var(--toggle-bg);
    border: none; border-radius: 10px;
    cursor: pointer; position: relative;
    transition: background 0.2s;
  }
  .theme-toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--text-1);
    transition: transform 0.2s;
  }
  [data-theme="dark"] .theme-toggle::after { transform: translateX(16px); }
  .allure-link {
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    padding: 4px 10px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    transition: background 0.15s;
  }
  .allure-link:hover { background: var(--accent-bg); }

  .dash-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 0 14px;
    font-size: 11px;
    color: var(--text-3);
  }
  .dash-toolbar svg { flex-shrink: 0; }
  .reset-btn {
    background: none;
    border: 1px solid var(--card-border);
    color: var(--text-2);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    margin-left: auto;
    font-family: inherit;
    transition: border-color 0.15s, color 0.15s;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    box-shadow: 0 1px 3px var(--card-shadow);
    overflow: hidden;
    transition: box-shadow 0.18s, border-color 0.18s, opacity 0.18s;
    position: relative;
  }
  .card.full-width { grid-column: 1 / -1; }
  .card.dragging { opacity: 0.4; border-color: var(--drop-indicator); }
  .card.drag-over {
    border-color: var(--drop-indicator);
    box-shadow: 0 0 0 2px var(--drag-ghost), 0 1px 3px var(--card-shadow);
  }

  .card-handle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px 0;
    cursor: grab;
    user-select: none;
  }
  .card-handle:active { cursor: grabbing; }
  .grip {
    display: flex;
    flex-direction: column;
    gap: 2px;
    opacity: 0.4;
    transition: opacity 0.15s;
  }
  .card-handle:hover .grip { opacity: 0.8; }
  .grip-row { display: flex; gap: 2px; }
  .grip-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--handle);
  }
  .card-handle:hover .grip-dot { background: var(--handle-hover); }
  .card-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-3);
  }
  .card-body { padding: 12px 14px 14px; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }
  .stat {
    text-align: center;
    padding: 8px 4px;
    position: relative;
  }
  .stat + .stat::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; height: 60%; width: 1px;
    background: var(--card-border);
  }
  .stat-val {
    font-size: 26px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .stat-val.passed { color: var(--passed); }
  .stat-val.failed { color: var(--failed); }
  .stat-val.total { color: var(--accent); }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-3);
    margin-top: 4px;
    font-weight: 500;
  }
  .stat-duration {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    color: var(--text-2);
  }

  .donut-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  .donut-canvas { flex-shrink: 0; }
  .donut-legend { display: flex; flex-direction: column; gap: 6px; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-2);
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-val {
    margin-left: auto;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text-1);
    min-width: 20px;
    text-align: right;
  }

  .test-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .test-table th {
    text-align: left;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-3);
    font-weight: 600;
    padding: 0 0 8px;
    border-bottom: 1px solid var(--card-border);
  }
  .test-table td {
    padding: 7px 0;
    border-bottom: 1px solid var(--card-border);
    vertical-align: middle;
  }
  .test-table tr:last-child td { border-bottom: none; }
  .test-row { cursor: pointer; transition: background 0.12s; }
  .test-row:hover { background: var(--accent-bg); }
  .test-row.expanded { background: var(--accent-bg); }
  .col-id {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 11px;
    color: var(--accent);
    width: 70px;
  }
  .col-name { color: var(--text-1); padding-right: 8px; }
  .col-name .expand-icon {
    display: inline-block;
    width: 14px;
    font-size: 10px;
    color: var(--text-3);
    margin-right: 4px;
    transition: transform 0.15s;
    vertical-align: middle;
  }
  .test-row.expanded .expand-icon { transform: rotate(90deg); }
  .col-status { width: 60px; text-align: center; }
  .col-dur {
    width: 72px;
    text-align: right;
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    font-size: 11px;
    color: var(--text-2);
  }
  .pill {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .pill.passed { background: var(--passed-bg); color: var(--passed); }
  .pill.failed { background: var(--failed-bg); color: var(--failed); }
  .pill.broken { background: var(--broken-bg); color: var(--broken); }
  .pill.skipped { background: var(--skipped-bg); color: var(--skipped); }

  /* Evidence panel */
  .evidence-row td {
    padding: 0 !important;
    border-bottom: 1px solid var(--card-border);
  }
  .evidence-panel {
    background: var(--evidence-bg);
    padding: 12px 16px;
    border-top: 1px solid var(--card-border);
  }
  .evidence-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-3);
    margin-bottom: 10px;
  }
  .evidence-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .evidence-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .evidence-type {
    flex-shrink: 0;
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 2px 6px;
    border-radius: 3px;
    min-width: 36px;
    text-align: center;
    margin-top: 2px;
  }
  .evidence-type.img { background: #DBEAFE; color: #2563EB; }
  .evidence-type.txt { background: #E0E7FF; color: #4338CA; }
  [data-theme="dark"] .evidence-type.img { background: rgba(37,99,235,0.15); color: #60A5FA; }
  [data-theme="dark"] .evidence-type.txt { background: rgba(67,56,202,0.15); color: #A5B4FC; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .evidence-type.img { background: rgba(37,99,235,0.15); color: #60A5FA; }
    :root:not([data-theme="light"]) .evidence-type.txt { background: rgba(67,56,202,0.15); color: #A5B4FC; }
  }
  .evidence-content { flex: 1; min-width: 0; }
  .evidence-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-1);
    margin-bottom: 4px;
  }
  .evidence-text {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.5;
    color: var(--text-2);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 200px;
    overflow-y: auto;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    padding: 8px 10px;
  }
  .evidence-img {
    max-width: 100%;
    border: 1px solid var(--card-border);
    border-radius: 4px;
    cursor: pointer;
  }
  .evidence-img:hover { border-color: var(--accent); }
  .evidence-none {
    font-size: 11px;
    color: var(--text-3);
    font-style: italic;
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    cursor: zoom-out;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 6px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .dur-bars { display: flex; flex-direction: column; gap: 5px; }
  .dur-row {
    display: grid;
    grid-template-columns: 68px 1fr 52px;
    align-items: center;
    gap: 8px;
    font-size: 11px;
  }
  .dur-label {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 10px;
    color: var(--accent);
  }
  .dur-track {
    height: 14px;
    background: var(--bar-track);
    border-radius: 3px;
    overflow: hidden;
  }
  .dur-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--accent);
    opacity: 0.7;
    transition: width 0.4s ease;
  }
  .dur-fill.failed { background: var(--failed); }
  .dur-fill.broken { background: var(--broken); }
  .dur-val {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-2);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .cat-list { display: flex; flex-direction: column; gap: 8px; }
  .cat-item { display: flex; align-items: center; gap: 10px; }
  .cat-stripe {
    width: 3px; height: 28px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .cat-info { flex: 1; min-width: 0; }
  .cat-name { font-size: 12px; font-weight: 600; color: var(--text-1); }
  .cat-desc { font-size: 10px; color: var(--text-3); margin-top: 1px; }
  .cat-count {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--text-1);
    font-variant-numeric: tabular-nums;
  }

  @media (max-width: 680px) {
    body { padding: 12px; }
    .grid { grid-template-columns: 1fr; }
    .card.full-width { grid-column: 1; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .donut-wrap { flex-direction: column; gap: 12px; }
    .dash-header { flex-wrap: wrap; }
  }
</style>
</head>

      </div>
      <div class="card-body">
        <div class="dur-bars" id="durBars"></div>
      </div>
    </div>

  </div>
</div>

<script>
(function() {
  var DATA = JSON.parse(document.getElementById('report-data').textContent);
  var stats = DATA.statistic;
  var tests = DATA.tests || [];
  var totalDur = DATA.time ? DATA.time.duration : 0;

  function fmtDur(ms) {
    if (ms >= 60000) { var m = Math.floor(ms/60000); var s = Math.round((ms%60000)/1000); return m + 'm ' + s + 's'; }
    if (ms >= 1000) return (ms/1000).toFixed(1) + 's';
    return ms + 'ms';
  }
  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Release label
  if (DATA.release) {
    document.getElementById('releaseLabel').textContent = DATA.release;
  }

  // Date
  if (DATA.time && DATA.time.start) {
    var d = new Date(DATA.time.start);
    document.getElementById('reportDate').textContent = d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
  }

  // Theme toggle
  var toggle = document.getElementById('themeToggle');
  var saved = localStorage.getItem('wm-dash-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('wm-dash-theme', next);
    drawDonut();
  });

  // Summary stats
  var statsRow = document.getElementById('statsRow');
  [
    { val: stats.total, cls: 'total', label: 'Total' },
    { val: stats.passed, cls: 'passed', label: 'Passed' },
    { val: (stats.failed || 0) + (stats.broken || 0), cls: 'failed', label: 'Failed' },
    { val: totalDur, cls: '', label: 'Duration', isDur: true }
  ].forEach(function(s) {
    var div = document.createElement('div');
    div.className = 'stat';
    div.innerHTML = s.isDur
      ? '<div class="stat-duration">' + fmtDur(s.val) + '</div><div class="stat-label">' + s.label + '</div>'
      : '<div class="stat-val ' + s.cls + '">' + s.val + '</div><div class="stat-label">' + s.label + '</div>';
    statsRow.appendChild(div);
  });

  // Donut
  var legendEl = document.getElementById('donutLegend');
  [
    { name: 'Passed', count: stats.passed, color: '--passed' },
    { name: 'Failed', count: stats.failed || 0, color: '--failed' },
    { name: 'Broken', count: stats.broken || 0, color: '--broken' },
    { name: 'Skipped', count: stats.skipped || 0, color: '--skipped' }
  ].forEach(function(seg) {
    var item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = '<span class="legend-dot" style="background:var(' + seg.color + ')"></span>' + seg.name + '<span class="legend-val">' + seg.count + '</span>';
    legendEl.appendChild(item);
  });

  function drawDonut() {
    var canvas = document.getElementById('donutCanvas');
    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    canvas.width = 120 * dpr; canvas.height = 120 * dpr;
    ctx.scale(dpr, dpr);
    canvas.style.width = '120px'; canvas.style.height = '120px';
    var cx = 60, cy = 60, r = 44, lw = 16;
    var style = getComputedStyle(document.documentElement);
    var colors = [
      { count: stats.passed, color: style.getPropertyValue('--passed').trim() },
      { count: stats.failed || 0, color: style.getPropertyValue('--failed').trim() },
      { count: stats.broken || 0, color: style.getPropertyValue('--broken').trim() },
      { count: stats.skipped || 0, color: style.getPropertyValue('--skipped').trim() }
    ];
    ctx.clearRect(0, 0, 120, 120);
    var total = stats.total || 1;
    var angle = -Math.PI / 2;
    colors.forEach(function(seg) {
      if (!seg.count) return;
      var sweep = (seg.count / total) * Math.PI * 2;
      ctx.beginPath(); ctx.arc(cx, cy, r, angle, angle + sweep);
      ctx.lineWidth = lw; ctx.strokeStyle = seg.color; ctx.stroke();
      angle += sweep;
    });
    var pct = total > 0 ? Math.round((stats.passed / total) * 100) : 0;
    ctx.fillStyle = style.getPropertyValue('--text-1').trim();
    ctx.font = '700 22px system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(pct + '%', cx, cy - 4);
    ctx.fillStyle = style.getPropertyValue('--text-3').trim();
    ctx.font = '500 9px system-ui, sans-serif';
    ctx.fillText('PASS RATE', cx, cy + 14);
  }
  drawDonut();
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', drawDonut);

  // Categories
  var catColors = ['#3B6DF0', '#8B5CF6', '#F59E0B', '#16A34A', '#EC4899'];
  var catDefs = [
    { pattern: /^AUTH-001$/, name: 'HTTPS Enforcement', desc: 'AUTH-001' },
    { pattern: /^AUTH-00[2-6]$/, name: 'Login & Session', desc: 'AUTH-002 to AUTH-006' },
    { pattern: /^AUTH-00[89]$/, name: 'Token Validation', desc: 'AUTH-008, AUTH-009' },
    { pattern: /^AUTH-01[01]$/, name: 'Input & Access', desc: 'AUTH-010, AUTH-011' }
  ];
  var catList = document.getElementById('catList');
  catDefs.forEach(function(cat, i) {
    var count = tests.filter(function(t) { return cat.pattern.test(t.id); }).length;
    if (!count) return;
    var item = document.createElement('div');
    item.className = 'cat-item';
    item.innerHTML = '<div class="cat-stripe" style="background:' + catColors[i] + '"></div>' +
      '<div class="cat-info"><div class="cat-name">' + esc(cat.name) + '</div><div class="cat-desc">' + esc(cat.desc) + '</div></div>' +
      '<div class="cat-count">' + count + '</div>';
    catList.appendChild(item);
  });

  // Test table with expandable evidence
  var tbody = document.getElementById('testBody');

  // Lightbox
  var lightbox = document.getElementById('lightbox');
  var lightboxImg = document.getElementById('lightboxImg');
  lightbox.addEventListener('click', function() { lightbox.classList.remove('active'); });

  tests.forEach(function(t, idx) {
    var pillCls = t.status === 'passed' ? 'passed' : t.status === 'broken' ? 'broken' : t.status === 'skipped' ? 'skipped' : 'failed';
    var pillLabel = t.status === 'passed' ? 'Pass' : t.status.charAt(0).toUpperCase() + t.status.slice(1);
    var hasEvidence = t.attachments && t.attachments.length > 0;
    var tr = document.createElement('tr');
    tr.className = 'test-row';
    tr.dataset.idx = idx;
    tr.innerHTML = '<td class="col-id">' + esc(t.id) + '</td>' +
      '<td class="col-name"><span class="expand-icon">' + (hasEvidence ? '▶' : '') + '</span>' + esc(t.name) + '</td>' +
      '<td class="col-status"><span class="pill ' + pillCls + '">' + pillLabel + '</span></td>' +
      '<td class="col-dur">' + fmtDur(t.duration) + '</td>';
    tbody.appendChild(tr);

    if (hasEvidence) {
      tr.style.cursor = 'pointer';
      var erow = document.createElement('tr');
      erow.className = 'evidence-row';
      erow.style.display = 'none';
      var etd = document.createElement('td');
      etd.colSpan = 4;
      var panel = document.createElement('div');
      panel.className = 'evidence-panel';
      panel.innerHTML = '<div class="evidence-title">Evidence (' + t.attachments.length + ' items)</div>';
      var grid = document.createElement('div');
      grid.className = 'evidence-grid';

      t.attachments.forEach(function(att) {
        var item = document.createElement('div');
        item.className = 'evidence-item';
        var isImg = att.type && att.type.indexOf('image') === 0;
        var typeLabel = isImg ? 'IMG' : 'TXT';
        var typeCls = isImg ? 'img' : 'txt';
        item.innerHTML = '<span class="evidence-type ' + typeCls + '">' + typeLabel + '</span><div class="evidence-content"><div class="evidence-label">' + esc(att.name) + '</div></div>';
        var content = item.querySelector('.evidence-content');

        if (isImg && (att.dataUri || att.source)) {
          var img = document.createElement('img');
          img.className = 'evidence-img';
          img.src = att.dataUri || ('data/attachments/' + att.source);
          img.alt = att.name;
          img.loading = 'lazy';
          img.addEventListener('click', function(e) {
            e.stopPropagation();
            lightboxImg.src = img.src;
            lightbox.classList.add('active');
          });
          content.appendChild(img);
        } else if (att.content) {
          var pre = document.createElement('div');
          pre.className = 'evidence-text';
          pre.textContent = att.content;
          content.appendChild(pre);
        } else if (att.source) {
          var link = document.createElement('a');
          link.href = 'data/attachments/' + att.source;
          link.target = '_blank';
          link.style.cssText = 'font-size:11px;color:var(--accent)';
          link.textContent = 'Open attachment';
          link.addEventListener('click', function(e) { e.stopPropagation(); });
          content.appendChild(link);
        }
        grid.appendChild(item);
      });

      panel.appendChild(grid);
      etd.appendChild(panel);
      erow.appendChild(etd);
      tbody.appendChild(erow);

      tr.addEventListener('click', function() {
        var isOpen = erow.style.display !== 'none';
        erow.style.display = isOpen ? 'none' : '';
        tr.classList.toggle('expanded', !isOpen);
      });
    }
  });

  // Duration bars
  var maxDur = Math.max.apply(null, tests.map(function(t) { return t.duration; }));
  var durBars = document.getElementById('durBars');
  tests.slice().sort(function(a, b) { return b.duration - a.duration; }).forEach(function(t) {
    var pct = maxDur > 0 ? (t.duration / maxDur * 100).toFixed(1) : 0;
    var barCls = t.status === 'failed' ? ' failed' : t.status === 'broken' ? ' broken' : '';
    var row = document.createElement('div');
    row.className = 'dur-row';
    row.innerHTML = '<span class="dur-label">' + esc(t.id) + '</span>' +
      '<div class="dur-track"><div class="dur-fill' + barCls + '" style="width:' + pct + '%"></div></div>' +
      '<span class="dur-val">' + fmtDur(t.duration) + '</span>';
    durBars.appendChild(row);
  });

  // ── Drag and drop ──
  var STORAGE_KEY = 'wm-dash-layout';
  var grid = document.getElementById('grid');
  var dragCard = null;
  function getCards() { return Array.prototype.slice.call(grid.querySelectorAll('.card')); }
  function getOrder() { return getCards().map(function(c) { return c.dataset.cardId; }); }
  function saveOrder() {
    var widths = {};
    getCards().forEach(function(c) { widths[c.dataset.cardId] = c.classList.contains('full-width'); });
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ order: getOrder(), widths: widths })); } catch(e) {}
  }
  function restoreOrder() {
    try {
      var s = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (!s || !s.order) return;
      var byId = {};
      getCards().forEach(function(c) { byId[c.dataset.cardId] = c; });
      s.order.forEach(function(id) { if (byId[id]) grid.appendChild(byId[id]); });
      if (s.widths) Object.keys(s.widths).forEach(function(id) {
        if (byId[id]) { if (s.widths[id]) byId[id].classList.add('full-width'); else byId[id].classList.remove('full-width'); }
      });
    } catch(e) {}
  }
  restoreOrder();

  grid.addEventListener('dragstart', function(e) {
    var h = e.target.closest('.card-handle');
    if (!h) { e.preventDefault(); return; }
    dragCard = h.closest('.card');
    dragCard.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragCard.dataset.cardId);
  });
  grid.addEventListener('dragend', function() {
    if (dragCard) dragCard.classList.remove('dragging');
    getCards().forEach(function(c) { c.classList.remove('drag-over'); });
    dragCard = null;
  });
  grid.addEventListener('dragover', function(e) {
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    var t = e.target.closest('.card');
    getCards().forEach(function(c) { c.classList.remove('drag-over'); });
    if (t && t !== dragCard) t.classList.add('drag-over');
  });
  grid.addEventListener('dragleave', function(e) {
    var t = e.target.closest('.card'); if (t) t.classList.remove('drag-over');
  });
  grid.addEventListener('drop', function(e) {
    e.preventDefault();
    var t = e.target.closest('.card');
    if (!t || !dragCard || t === dragCard) return;
    var cards = getCards();
    if (cards.indexOf(dragCard) < cards.indexOf(t)) t.after(dragCard);
    else t.before(dragCard);
    getCards().forEach(function(c) { c.classList.remove('drag-over'); });
    saveOrder();
  });
  grid.addEventListener('dblclick', function(e) {
    var h = e.target.closest('.card-handle'); if (!h) return;
    h.closest('.card').classList.toggle('full-width');
    saveOrder();
  });

  document.getElementById('resetBtn').addEventListener('click', function() {
    try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    var def = ['summary','donut','categories','tests','durations'];
    var full = { summary:1, tests:1, durations:1 };
    var byId = {};
    getCards().forEach(function(c) { byId[c.dataset.cardId] = c; });
    def.forEach(function(id) { if (byId[id]) grid.appendChild(byId[id]); });
    getCards().forEach(function(c) { if (full[c.dataset.cardId]) c.classList.add('full-width'); else c.classList.remove('full-width'); });
  });
})();
</script>
</body>
</html>
